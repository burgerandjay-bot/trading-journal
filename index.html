<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>交易日誌</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f9;color:#1a1a1a;min-height:100vh}
header{background:#1e3a5f;color:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;font-weight:600;letter-spacing:0.5px}
header span{font-size:13px;opacity:0.7}
.container{max-width:1100px;margin:0 auto;padding:24px 20px}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:#fff;border-radius:10px;padding:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.tab{flex:1;padding:10px;text-align:center;border:none;background:none;border-radius:7px;font-size:14px;cursor:pointer;color:#555;font-weight:500;transition:all 0.15s}
.tab.active{background:#1e3a5f;color:#fff}
.section{display:none}.section.active{display:block}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:20px}
.card-title{font-size:15px;font-weight:600;color:#1e3a5f;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:6px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fff;transition:border 0.15s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#1e3a5f}
.form-group textarea{resize:vertical;min-height:72px}
.upload-area{border:2px dashed #c5d0de;border-radius:8px;padding:20px;text-align:center;cursor:pointer;color:#888;font-size:13px;transition:all 0.15s}
.upload-area:hover{border-color:#1e3a5f;background:#f0f4ff}
.upload-area input{display:none}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;font-family:inherit}
.btn-primary{background:#1e3a5f;color:#fff}.btn-primary:hover{background:#162d4a}
.btn-secondary{background:#f0f0f0;color:#555}.btn-secondary:hover{background:#e0e0e0}
.btn-danger{background:none;border:1px solid #e0e0e0;color:#e74c3c;font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-danger:hover{background:#fff0f0}
.btn-export{background:#27ae60;color:#fff;font-size:13px;padding:8px 16px}.btn-export:hover{background:#219a52}
.msg{font-size:13px;margin-top:10px;min-height:18px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.metric{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,0.08);border-left:4px solid #1e3a5f}
.metric.green{border-left-color:#2ecc71}
.metric.red{border-left-color:#e74c3c}
.metric.amber{border-left-color:#f39c12}
.metric .label{font-size:12px;color:#888;margin-bottom:6px}
.metric .value{font-size:24px;font-weight:700;color:#1a1a1a}
.metric .value.pos{color:#27ae60}.metric .value.neg{color:#e74c3c}
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a1a1a;background:#fff;font-family:inherit}
.filter-bar input{flex:2;min-width:160px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;border-bottom:2px solid #f0f0f0;font-size:12px;color:#888;font-weight:600;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tr:hover td{background:#fafcff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-long{background:#d5f0e0;color:#1a7a3c}
.badge-short{background:#fde8e8;color:#a32d2d}
.pnl-pos{color:#27ae60;font-weight:600}
.pnl-neg{color:#e74c3c;font-weight:600}
.img-thumb{width:52px;height:38px;object-fit:cover;border-radius:5px;cursor:pointer;border:1px solid #e0e0e0}
.empty{text-align:center;padding:50px 20px;color:#aaa;font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px}
.chart-wrap{position:relative;width:100%;height:280px;margin-bottom:8px}
.chart-title{font-size:14px;font-weight:600;color:#444;margin-bottom:12px}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-overlay img{max-width:92%;max-height:92%;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,0.4)}
.modal-close{position:fixed;top:18px;right:22px;color:#fff;font-size:28px;cursor:pointer;z-index:1001;opacity:0.8}
.modal-close:hover{opacity:1}
.img-preview-wrap{margin-top:10px}
.img-preview-wrap img{max-height:130px;border-radius:8px;border:1px solid #e0e0e0}
.row-actions{display:flex;gap:6px;align-items:center}
.legend{display:flex;gap:16px;margin-bottom:10px;font-size:12px;color:#666}
.legend span{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px}
@media(max-width:640px){
  .form-grid,.form-grid.three,.metrics{grid-template-columns:1fr}
  .filter-bar{flex-direction:column}
}
</style>
</head>
<body>
<header>
  <h1>📈 交易日誌</h1>
  <span id="header-date"></span>
</header>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('add',this)">新增交易</button>
    <button class="tab" onclick="switchTab('list',this)">交易紀錄</button>
    <button class="tab" onclick="switchTab('stats',this)">統計分析</button>
  </div>

  <!-- 新增交易 -->
  <div id="tab-add" class="section active">
    <div class="card">
      <div class="card-title">新增交易紀錄</div>
      <div class="form-grid">
        <div class="form-group"><label>交易商品</label><input id="f-symbol" placeholder="例：台指期、BTCUSDT、TSLA"/></div>
        <div class="form-group"><label>日期時間</label><input id="f-date" type="datetime-local"/></div>
      </div>
      <div class="form-grid three">
        <div class="form-group"><label>交易方向</label>
          <select id="f-dir"><option value="多">做多</option><option value="空">做空</option></select>
        </div>
        <div class="form-group"><label>交易口數</label><input id="f-qty" type="number" min="1" placeholder="1"/></div>
        <div class="form-group"><label>損益點數（正=獲利，負=虧損）</label><input id="f-pnl" type="number" placeholder="例：+50 或 -30"/></div>
      </div>
      <div class="form-group" style="margin-bottom:16px"><label>備註</label>
        <textarea id="f-note" placeholder="交易策略、進場理由、心得..."></textarea>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>交易截圖</label>
        <div class="upload-area" onclick="document.getElementById('f-img').click()">
          <div style="font-size:24px;margin-bottom:6px">📷</div>
          點擊上傳截圖（PNG / JPG）
          <input id="f-img" type="file" accept="image/*" onchange="previewImg(this)"/>
        </div>
        <div id="img-preview-wrap" class="img-preview-wrap" style="display:none">
          <img id="img-preview"/><br/>
          <button class="btn btn-danger" style="margin-top:6px" onclick="clearImg()">移除截圖</button>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" onclick="addTrade()">儲存紀錄</button>
        <button class="btn btn-secondary" onclick="clearForm()">清除</button>
      </div>
      <div class="msg" id="add-msg"></div>
    </div>
  </div>

  <!-- 交易紀錄 -->
  <div id="tab-list" class="section">
    <div class="metrics" id="metrics-list">
      <div class="metric"><div class="label">總交易次數</div><div class="value" id="m-count">0</div></div>
      <div class="metric green"><div class="label">總損益（點）</div><div class="value" id="m-total">0</div></div>
      <div class="metric amber"><div class="label">勝率</div><div class="value" id="m-winrate">-</div></div>
      <div class="metric"><div class="label">平均損益</div><div class="value" id="m-avg">0</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="card-title" style="margin-bottom:0;border:none;padding:0">所有交易</div>
        <button class="btn btn-export" onclick="exportCSV()">匯出 CSV</button>
      </div>
      <div class="filter-bar">
        <select id="flt-dir" onchange="renderList()"><option value="">全部方向</option><option value="多">做多</option><option value="空">做空</option></select>
        <select id="flt-pnl" onchange="renderList()"><option value="">全部損益</option><option value="win">獲利</option><option value="loss">虧損</option></select>
        <input id="flt-sym" placeholder="搜尋商品..." oninput="renderList()"/>
      </div>
      <div id="trade-table"></div>
    </div>
  </div>

  <!-- 統計分析 -->
  <div id="tab-stats" class="section">
    <div class="metrics">
      <div class="metric green"><div class="label">最大獲利（點）</div><div class="value pos" id="s-max">-</div></div>
      <div class="metric red"><div class="label">最大虧損（點）</div><div class="value neg" id="s-min">-</div></div>
      <div class="metric"><div class="label">獲利次數</div><div class="value pos" id="s-wins">0</div></div>
      <div class="metric"><div class="label">虧損次數</div><div class="value neg" id="s-losses">0</div></div>
    </div>
    <div class="card">
      <div class="chart-title">累計損益曲線</div>
      <div class="chart-wrap"><canvas id="chart-cumulative"></canvas></div>
    </div>
    <div class="card">
      <div class="chart-title">損益分布</div>
      <div class="legend">
        <span><span class="legend-dot" style="background:#2ecc71"></span>獲利</span>
        <span><span class="legend-dot" style="background:#e74c3c"></span>虧損</span>
      </div>
      <div class="chart-wrap"><canvas id="chart-dist"></canvas></div>
    </div>
    <div class="card">
      <div class="chart-title">做多 vs 做空 勝率比較</div>
      <div class="chart-wrap" style="height:220px"><canvas id="chart-dir"></canvas></div>
    </div>
  </div>
</div>

<!-- 圖片放大 Modal -->
<div id="img-modal" class="modal-overlay" onclick="closeModal()">
  <span class="modal-close" onclick="closeModal()">✕</span>
  <img id="modal-img" src="" alt="截圖"/>
</div>

<script>
let trades = JSON.parse(localStorage.getItem('tj_trades')||'[]');
let imgData = null;
let charts = {};

document.getElementById('header-date').textContent = new Date().toLocaleDateString('zh-Hant',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
document.getElementById('f-date').value = new Date().toISOString().slice(0,16);

function switchTab(t, btn) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='list'){ renderList(); renderMetrics('list'); }
  if(t==='stats'){ renderStatsMetrics(); renderCharts(); }
}

function previewImg(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgData = e.target.result;
    document.getElementById('img-preview').src = imgData;
    document.getElementById('img-preview-wrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
}
function clearImg() {
  imgData = null;
  document.getElementById('f-img').value = '';
  document.getElementById('img-preview-wrap').style.display = 'none';
}

function addTrade() {
  const sym = document.getElementById('f-symbol').value.trim();
  const pnl = parseFloat(document.getElementById('f-pnl').value);
  if(!sym){ showMsg('請輸入交易商品','#e74c3c'); return; }
  if(isNaN(pnl)){ showMsg('請輸入損益點數','#e74c3c'); return; }
  const trade = {
    id: Date.now(),
    symbol: sym,
    date: document.getElementById('f-date').value || new Date().toISOString().slice(0,16),
    dir: document.getElementById('f-dir').value,
    qty: parseInt(document.getElementById('f-qty').value)||1,
    pnl,
    note: document.getElementById('f-note').value.trim(),
    img: imgData
  };
  trades.unshift(trade);
  save();
  showMsg('✓ 已成功儲存','#27ae60');
  clearForm();
}

function clearForm() {
  ['f-symbol','f-pnl','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-qty').value='';
  document.getElementById('f-dir').value='多';
  document.getElementById('f-date').value=new Date().toISOString().slice(0,16);
  clearImg();
}

function showMsg(msg, color) {
  const el = document.getElementById('add-msg');
  el.textContent = msg;
  el.style.color = color;
  setTimeout(()=>el.textContent='', 2500);
}

function save() {
  try { localStorage.setItem('tj_trades', JSON.stringify(trades)); }
  catch(e) { alert('儲存失敗，可能是截圖檔案太大'); }
}

function deleteTrade(id) {
  if(!confirm('確定刪除這筆紀錄？')) return;
  trades = trades.filter(t=>t.id!==id);
  save(); renderList(); renderMetrics('list');
}

function renderMetrics(tab) {
  const total = trades.reduce((s,t)=>s+t.pnl,0);
  const wins = trades.filter(t=>t.pnl>0);
  const avg = trades.length ? total/trades.length : 0;
  const wr = trades.length ? Math.round(wins.length/trades.length*100) : 0;
  document.getElementById('m-count').textContent = trades.length;
  const mTotal = document.getElementById('m-total');
  mTotal.textContent = (total>=0?'+':'')+total.toFixed(0);
  mTotal.className = 'value '+(total>=0?'pos':'neg');
  document.getElementById('m-winrate').textContent = trades.length ? wr+'%' : '-';
  const mAvg = document.getElementById('m-avg');
  mAvg.textContent = (avg>=0?'+':'')+avg.toFixed(1);
  mAvg.className = 'value '+(avg>=0?'pos':'neg');
}

function renderStatsMetrics() {
  const wins = trades.filter(t=>t.pnl>0);
  const losses = trades.filter(t=>t.pnl<0);
  document.getElementById('s-max').textContent = trades.length ? '+'+Math.max(...trades.map(t=>t.pnl)) : '-';
  document.getElementById('s-min').textContent = trades.length ? Math.min(...trades.map(t=>t.pnl)) : '-';
  document.getElementById('s-wins').textContent = wins.length;
  document.getElementById('s-losses').textContent = losses.length;
}

function renderList() {
  renderMetrics('list');
  const dirF = document.getElementById('flt-dir').value;
  const pnlF = document.getElementById('flt-pnl').value;
  const symF = document.getElementById('flt-sym').value.toLowerCase();
  let data = trades.filter(t=>{
    if(dirF && t.dir!==dirF) return false;
    if(pnlF==='win' && t.pnl<=0) return false;
    if(pnlF==='loss' && t.pnl>=0) return false;
    if(symF && !t.symbol.toLowerCase().includes(symF)) return false;
    return true;
  });
  const el = document.getElementById('trade-table');
  if(!data.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>尚無交易紀錄</div>';
    return;
  }
  el.innerHTML=`<table>
    <tr>
      <th>時間</th><th>商品</th><th>方向</th><th>口數</th>
      <th>損益（點）</th><th>備註</th><th>截圖</th><th></th>
    </tr>
    ${data.map(t=>`<tr>
      <td style="white-space:nowrap;color:#888;font-size:12px">${t.date.replace('T',' ')}</td>
      <td style="font-weight:600">${t.symbol}</td>
      <td><span class="badge ${t.dir==='多'?'badge-long':'badge-short'}">${t.dir==='多'?'做多':'做空'}</span></td>
      <td>${t.qty}</td>
      <td class="${t.pnl>=0?'pnl-pos':'pnl-neg'}">${t.pnl>=0?'+':''}${t.pnl}</td>
      <td style="color:#888;font-size:12px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.note||''}">${t.note||'-'}</td>
      <td>${t.img?`<img class="img-thumb" src="${t.img}" onclick="openModal(${t.id})" title="點擊放大"/>`:'<span style="color:#ccc;font-size:12px">無</span>'}</td>
      <td><button class="btn btn-danger" onclick="deleteTrade(${t.id})">刪除</button></td>
    </tr>`).join('')}
  </table>`;
}

function openModal(id) {
  const t = trades.find(x=>x.id===id);
  if(!t||!t.img) return;
  document.getElementById('modal-img').src = t.img;
  document.getElementById('img-modal').classList.add('open');
}
function closeModal() { document.getElementById('img-modal').classList.remove('open'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

function renderCharts() {
  Object.values(charts).forEach(c=>c.destroy());
  charts = {};
  const sorted = [...trades].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!sorted.length) return;

  let cum = 0;
  charts.cum = new Chart(document.getElementById('chart-cumulative'), {
    type:'line',
    data:{
      labels: sorted.map(t=>t.date.slice(5,16)),
      datasets:[{
        label:'累計損益',
        data: sorted.map(t=>{ cum+=t.pnl; return cum; }),
        borderColor:'#1e3a5f',
        backgroundColor:'rgba(30,58,95,0.07)',
        fill:true, tension:0.35, pointRadius:4,
        pointBackgroundColor: sorted.map((_,i)=>{ let s=0; sorted.slice(0,i+1).forEach(x=>s+=x.pnl); return s>=0?'#2ecc71':'#e74c3c'; })
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{maxRotation:45,font:{size:11}},grid:{color:'rgba(0,0,0,0.04)'}},
              y:{ticks:{callback:v=>v>=0?'+'+v:v,font:{size:11}},grid:{color:'rgba(0,0,0,0.04)'}}}}
  });

  const bins={};
  sorted.forEach(t=>{ const b=Math.floor(t.pnl/10)*10; bins[b]=(bins[b]||0)+1; });
  const bKeys=Object.keys(bins).map(Number).sort((a,b)=>a-b);
  charts.dist = new Chart(document.getElementById('chart-dist'),{
    type:'bar',
    data:{
      labels:bKeys.map(b=>b>=0?'+'+b:String(b)),
      datasets:[{label:'次數',data:bKeys.map(b=>bins[b]),
        backgroundColor:bKeys.map(b=>b>=0?'rgba(46,204,113,0.75)':'rgba(231,76,60,0.75)'),borderRadius:5}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{ticks:{stepSize:1,font:{size:11}},grid:{color:'rgba(0,0,0,0.04)'}}}}
  });

  const longWin = trades.filter(t=>t.dir==='多'&&t.pnl>0).length;
  const longLoss = trades.filter(t=>t.dir==='多'&&t.pnl<=0).length;
  const shortWin = trades.filter(t=>t.dir==='空'&&t.pnl>0).length;
  const shortLoss = trades.filter(t=>t.dir==='空'&&t.pnl<=0).length;
  charts.dir = new Chart(document.getElementById('chart-dir'),{
    type:'bar',
    data:{
      labels:['做多','做空'],
      datasets:[
        {label:'獲利',data:[longWin,shortWin],backgroundColor:'rgba(46,204,113,0.75)',borderRadius:5},
        {label:'虧損',data:[longLoss,shortLoss],backgroundColor:'rgba(231,76,60,0.75)',borderRadius:5}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{size:12},boxWidth:12,padding:16}}},
      scales:{x:{grid:{display:false}},y:{ticks:{stepSize:1},grid:{color:'rgba(0,0,0,0.04)'}}}}
  });
}

function exportCSV() {
  if(!trades.length){ alert('尚無資料可匯出'); return; }
  const header = ['時間','商品','方向','口數','損益(點)','備註'];
  const rows = trades.map(t=>[t.date.replace('T',' '),t.symbol,t.dir==='多'?'做多':'做空',t.qty,t.pnl,'"'+(t.note||'').replace(/"/g,'""')+'"']);
  const csv = '\uFEFF'+[header,...rows].map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = '交易紀錄_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

renderMetrics('list');
</script>
</body>
</html>
