<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>交易日誌</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f9;color:#1a1a1a;min-height:100vh}
header{background:#1e3a5f;color:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;font-weight:600}
.sync-status{font-size:12px;opacity:0.9;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#2ecc71;display:inline-block}
.dot.offline{background:#e74c3c}.dot.syncing{background:#f39c12;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:#fff;border-radius:10px;padding:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.tab{flex:1;padding:10px;text-align:center;border:none;background:none;border-radius:7px;font-size:14px;cursor:pointer;color:#555;font-weight:500;transition:all 0.15s}
.tab.active{background:#1e3a5f;color:#fff}
.section{display:none}.section.active{display:block}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:20px}
.card-title{font-size:15px;font-weight:600;color:#1e3a5f;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:6px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fff;transition:border 0.15s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#1e3a5f}
.form-group textarea{resize:vertical;min-height:72px}
.upload-area{border:2px dashed #c5d0de;border-radius:8px;padding:20px;text-align:center;cursor:pointer;color:#888;font-size:13px;transition:all 0.15s}
.upload-area:hover{border-color:#1e3a5f;background:#f0f4ff}
.upload-area input{display:none}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;font-family:inherit}
.btn-primary{background:#1e3a5f;color:#fff}.btn-primary:hover{background:#162d4a}
.btn-primary:disabled{background:#aaa;cursor:not-allowed}
.btn-secondary{background:#f0f0f0;color:#555}.btn-secondary:hover{background:#e0e0e0}
.btn-danger{background:none;border:1px solid #e0e0e0;color:#e74c3c;font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-danger:hover{background:#fff0f0}
.btn-edit{background:none;border:1px solid #c5d0de;color:#1e3a5f;font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit;margin-right:4px}
.btn-edit:hover{background:#f0f4ff}
.btn-export{background:#27ae60;color:#fff;font-size:13px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:500}
.msg{font-size:13px;margin-top:10px;min-height:18px}
.metrics{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:20px}
.metric{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.08);border-left:4px solid #1e3a5f}
.metric.green{border-left-color:#2ecc71}.metric.red{border-left-color:#e74c3c}
.metric.amber{border-left-color:#f39c12}.metric.blue{border-left-color:#3498db}
.metric .label{font-size:11px;color:#888;margin-bottom:4px}
.metric .value{font-size:19px;font-weight:700}
.metric .value.pos{color:#27ae60}.metric .value.neg{color:#e74c3c}
.period-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.period-tab{padding:6px 16px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#555;font-weight:500}
.period-tab.active{background:#1e3a5f;color:#fff;border-color:#1e3a5f}
.ptable-wrap{overflow-x:auto}
.ptable{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
.ptable th{text-align:left;padding:9px 12px;border-bottom:2px solid #f0f0f0;font-size:12px;color:#888;font-weight:600;white-space:nowrap}
.ptable td{padding:9px 12px;border-bottom:1px solid #f5f5f5;white-space:nowrap}
.ptable tr:last-child td{border-bottom:none}
.ptable tr:hover td{background:#fafcff}
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a1a1a;background:#fff;font-family:inherit}
.filter-bar input{flex:2;min-width:140px}
.trade-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:800px}
th{text-align:left;padding:10px 12px;border-bottom:2px solid #f0f0f0;font-size:12px;color:#888;font-weight:600;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tr:hover td{background:#fafcff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-long{background:#d5f0e0;color:#1a7a3c}
.badge-short{background:#fde8e8;color:#a32d2d}
.pnl-pos{color:#27ae60;font-weight:600}
.pnl-neg{color:#e74c3c;font-weight:600}
.img-thumb{width:48px;height:36px;object-fit:cover;border-radius:5px;cursor:pointer;border:1px solid #e0e0e0}
.empty{text-align:center;padding:50px 20px;color:#aaa;font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px}
.chart-wrap{position:relative;width:100%;height:280px;margin-bottom:8px}
.chart-title{font-size:14px;font-weight:600;color:#444;margin-bottom:12px}
.img-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center}
.img-modal.open{display:flex}
.img-modal img{max-width:92%;max-height:92%;border-radius:10px}
.modal-close{position:fixed;top:18px;right:22px;color:#fff;font-size:28px;cursor:pointer;z-index:1001}
.edit-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.edit-modal.open{display:flex}
.edit-box{background:#fff;border-radius:14px;padding:28px;width:90%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.edit-box h3{font-size:16px;font-weight:600;color:#1e3a5f;margin-bottom:20px}
.custom-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1100;align-items:center;justify-content:center}
.custom-modal.open{display:flex}
.custom-box{background:#fff;border-radius:14px;padding:24px;width:90%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.custom-box h4{font-size:15px;font-weight:600;color:#1e3a5f;margin-bottom:14px}
.img-preview-wrap{margin-top:10px}
.img-preview-wrap img{max-height:130px;border-radius:8px;border:1px solid #e0e0e0}
.legend{display:flex;gap:16px;margin-bottom:10px;font-size:12px;color:#666}
.legend span{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px}
.loading{text-align:center;padding:30px;color:#888;font-size:14px}
.strat-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;background:#eef2ff;color:#3451b2;font-weight:500}
@media(max-width:768px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .form-grid,.form-grid.three{grid-template-columns:1fr}
  .filter-bar{flex-direction:column}
}
</style>
</head>
<body>
<header>
  <h1>📈 交易日誌</h1>
  <div class="sync-status"><span class="dot" id="sync-dot"></span><span id="sync-text">連線中...</span></div>
</header>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('add',this)">新增交易</button>
    <button class="tab" onclick="switchTab('list',this)">交易紀錄</button>
    <button class="tab" onclick="switchTab('stats',this)">統計分析</button>
  </div>

  <!-- 新增交易 -->
  <div id="tab-add" class="section active">
    <div class="card">
      <div class="card-title">新增交易紀錄</div>
      <div class="form-grid">
        <div class="form-group">
          <label>交易商品</label>
          <div style="display:flex;gap:8px">
            <select id="f-symbol" style="flex:1"></select>
            <button class="btn btn-secondary" style="padding:10px 14px;font-size:13px;white-space:nowrap" onclick="openCustomModal('symbol')">+ 新增</button>
          </div>
        </div>
        <div class="form-group"><label>日期時間</label><input id="f-date" type="datetime-local"/></div>
      </div>
      <div class="form-grid three">
        <div class="form-group"><label>交易方向</label>
          <select id="f-dir"><option value="多">做多</option><option value="空">做空</option></select>
        </div>
        <div class="form-group"><label>交易口數</label><input id="f-qty" type="number" min="1" placeholder="1"/></div>
        <div class="form-group"><label>損益點數（正=獲利，負=虧損）</label><input id="f-pnl" type="number" placeholder="例：+50 或 -30"/></div>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label>策略</label>
        <div style="display:flex;gap:8px">
          <select id="f-strategy" style="flex:1"></select>
          <button class="btn btn-secondary" style="padding:10px 14px;font-size:13px;white-space:nowrap" onclick="openCustomModal('strategy')">+ 新增</button>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px"><label>備註</label>
        <textarea id="f-note" placeholder="進場理由、心得..."></textarea>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>交易截圖</label>
        <div class="upload-area" onclick="document.getElementById('f-img').click()">
          <div style="font-size:24px;margin-bottom:6px">📷</div>點擊上傳截圖（PNG / JPG，建議 1MB 以下）
          <input id="f-img" type="file" accept="image/*" onchange="previewImg(this)"/>
        </div>
        <div id="img-preview-wrap" class="img-preview-wrap" style="display:none">
          <img id="img-preview"/><br/>
          <button class="btn btn-danger" style="margin-top:6px" onclick="clearImg()">移除截圖</button>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" id="save-btn" onclick="addTrade()">儲存紀錄</button>
        <button class="btn btn-secondary" onclick="clearForm()">清除</button>
      </div>
      <div class="msg" id="add-msg"></div>
    </div>
  </div>

  <!-- 交易紀錄 -->
  <div id="tab-list" class="section">
    <div class="metrics">
      <div class="metric"><div class="label">總交易次數</div><div class="value" id="m-count">0</div></div>
      <div class="metric green"><div class="label">總損益（點）</div><div class="value" id="m-total">0</div></div>
      <div class="metric green"><div class="label">總損益（元）</div><div class="value" id="m-total-amt">0</div></div>
      <div class="metric amber"><div class="label">整體勝率</div><div class="value" id="m-winrate">-</div></div>
      <div class="metric blue"><div class="label">做多勝率</div><div class="value" id="m-long-wr">-</div></div>
      <div class="metric blue"><div class="label">做空勝率</div><div class="value" id="m-short-wr">-</div></div>
      <div class="metric red"><div class="label">平均虧損</div><div class="value neg" id="m-avg-loss">-</div></div>
    </div>

    <div class="card">
      <div class="card-title">週期統計</div>
      <div class="period-tabs">
        <button class="period-tab active" onclick="switchPeriod('day',this)">今日</button>
        <button class="period-tab" onclick="switchPeriod('week',this)">本週</button>
        <button class="period-tab" onclick="switchPeriod('month',this)">本月</button>
        <button class="period-tab" onclick="switchPeriod('all_day',this)">全部（按日）</button>
        <button class="period-tab" onclick="switchPeriod('all_month',this)">全部（按月）</button>
      </div>
      <div class="ptable-wrap"><div id="period-table-wrap"><div class="loading">載入中...</div></div></div>
    </div>

    <div class="card">
      <div class="card-title">策略勝率</div>
      <div class="ptable-wrap"><div id="strategy-table"><div class="loading">載入中...</div></div></div>
    </div>

    <div class="card">
      <div class="card-title">星期勝率</div>
      <div class="ptable-wrap"><div id="weekday-table"><div class="loading">載入中...</div></div></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="card-title" style="margin-bottom:0;border:none;padding:0">所有交易</div>
        <button class="btn-export" onclick="exportCSV()">匯出 CSV</button>
      </div>
      <div class="filter-bar">
        <select id="flt-dir" onchange="renderList()"><option value="">全部方向</option><option value="多">做多</option><option value="空">做空</option></select>
        <select id="flt-pnl" onchange="renderList()"><option value="">全部損益</option><option value="win">獲利</option><option value="loss">虧損</option></select>
        <select id="flt-strat" onchange="renderList()"><option value="">全部策略</option></select>
        <input id="flt-sym" placeholder="搜尋商品..." oninput="renderList()"/>
      </div>
      <div class="trade-wrap"><div id="trade-table"><div class="loading">載入中...</div></div></div>
    </div>
  </div>

  <!-- 統計分析 -->
  <div id="tab-stats" class="section">
    <div class="metrics" style="grid-template-columns:repeat(4,1fr)">
      <div class="metric green"><div class="label">最大獲利（點）</div><div class="value pos" id="s-max">-</div></div>
      <div class="metric red"><div class="label">最大虧損（點）</div><div class="value neg" id="s-min">-</div></div>
      <div class="metric"><div class="label">獲利次數</div><div class="value pos" id="s-wins">0</div></div>
      <div class="metric"><div class="label">虧損次數</div><div class="value neg" id="s-losses">0</div></div>
    </div>
    <div class="card"><div class="chart-title">累計損益曲線（點）</div><div class="chart-wrap"><canvas id="chart-cumulative"></canvas></div></div>
    <div class="card">
      <div class="chart-title">損益分布</div>
      <div class="legend"><span><span class="legend-dot" style="background:#2ecc71"></span>獲利</span><span><span class="legend-dot" style="background:#e74c3c"></span>虧損</span></div>
      <div class="chart-wrap"><canvas id="chart-dist"></canvas></div>
    </div>
    <div class="card"><div class="chart-title">做多 vs 做空 勝率比較</div><div class="chart-wrap" style="height:220px"><canvas id="chart-dir"></canvas></div></div>
  </div>
</div>

<!-- 圖片放大 -->
<div id="img-modal" class="img-modal" onclick="closeImgModal()">
  <span class="modal-close">✕</span><img id="modal-img" src="" alt="截圖"/>
</div>

<!-- 編輯 Modal -->
<div id="edit-modal" class="edit-modal">
  <div class="edit-box">
    <h3>✏️ 編輯交易紀錄</h3>
    <input type="hidden" id="e-id"/>
    <div class="form-grid">
      <div class="form-group">
        <label>交易商品</label>
        <select id="e-symbol"></select>
      </div>
      <div class="form-group"><label>日期時間</label><input id="e-date" type="datetime-local"/></div>
    </div>
    <div class="form-grid three">
      <div class="form-group"><label>方向</label><select id="e-dir"><option value="多">做多</option><option value="空">做空</option></select></div>
      <div class="form-group"><label>口數</label><input id="e-qty" type="number" min="1"/></div>
      <div class="form-group"><label>損益點數</label><input id="e-pnl" type="number"/></div>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>策略</label>
      <select id="e-strategy"></select>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label>備註</label><textarea id="e-note"></textarea></div>
    <div class="form-group" style="margin-bottom:20px">
      <label>截圖</label>
      <div id="e-img-current" style="margin-bottom:8px"></div>
      <div class="upload-area" onclick="document.getElementById('e-img').click()" style="padding:12px">
        點擊更換截圖（留空則保留原圖）<input id="e-img" type="file" accept="image/*" onchange="previewEditImg(this)"/>
      </div>
      <div id="e-img-preview-wrap" class="img-preview-wrap" style="display:none">
        <img id="e-img-preview"/><br/><button class="btn btn-danger" style="margin-top:6px" onclick="clearEditImg()">移除新截圖</button>
      </div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" id="edit-save-btn" onclick="saveTrade()">儲存修改</button>
      <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
    </div>
    <div class="msg" id="edit-msg"></div>
  </div>
</div>

<!-- 新增商品/策略 Modal -->
<div id="custom-modal" class="custom-modal">
  <div class="custom-box" style="max-width:440px">
    <h4 id="custom-modal-title">管理商品</h4>
    <div id="custom-list" style="margin-bottom:14px;max-height:220px;overflow-y:auto"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input id="custom-input" placeholder="輸入新名稱..." style="flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit"/>
      <button class="btn btn-primary" style="padding:9px 16px" onclick="saveCustomItem()">新增</button>
    </div>
    <button class="btn btn-secondary" style="width:100%" onclick="closeCustomModal()">關閉</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, remove, update, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkfrAmBYmqqmQ84-uHyMQVOpzDC1FUAkQ",
  authDomain: "trading-journal-21649.firebaseapp.com",
  databaseURL: "https://trading-journal-21649-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "trading-journal-21649",
  storageBucket: "trading-journal-21649.firebasestorage.app",
  messagingSenderId: "548672611233",
  appId: "1:548672611233:web:05ecddfea11824f003a1e0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const tradesRef = ref(db, 'trades');
const symbolsRef = ref(db, 'symbols');
const strategiesRef = ref(db, 'strategies');
const PNL_PER_POINT = 2;

const DEFAULT_SYMBOLS = ['MNQ'];
const DEFAULT_STRATEGIES = [
  '1st FVG After 1hr Dealing Range',
  'Last FVG Before Turtle Soup',
  'IFVG',
  '9:30 1st FVG',
  'ATM',
  'Displacement With OB',
  '上頭',
  '衝動'
];

let trades = [], symbols = [...DEFAULT_SYMBOLS], strategies = [...DEFAULT_STRATEGIES];
let imgData = null, editImgData = null, editOrigImg = null, charts = {}, currentPeriod = 'day';
let customModalType = 'symbol';

const $ = id => document.getElementById(id);
$('f-date').value = new Date().toISOString().slice(0,16);

function setSyncStatus(s) {
  const dot=$('sync-dot'), text=$('sync-text');
  if(s==='ok'){dot.className='dot';text.textContent='已同步';}
  else if(s==='syncing'){dot.className='dot syncing';text.textContent='同步中...';}
  else{dot.className='dot offline';text.textContent='離線';}
}

// 監聽交易資料
onValue(tradesRef, snap => {
  const data = snap.val();
  trades = data ? Object.entries(data).map(([id,v])=>({id,...v})).sort((a,b)=>b.timestamp-a.timestamp) : [];
  setSyncStatus('ok');
  renderList();
  const at = document.querySelector('.tab.active');
  if(at && at.textContent.includes('統計')){ renderStatsMetrics(); renderCharts(); }
}, err => { setSyncStatus('offline'); console.error(err); });

function renderSymbolSelects() {
  ['f-symbol','e-symbol'].forEach(id => {
    const el = $(id); if(!el) return;
    const cur = el.value;
    el.innerHTML = symbols.map(s=>`<option value="${s}">${s}</option>`).join('');
    if(cur && symbols.includes(cur)) el.value = cur;
  });
  // 更新篩選下拉
  const flt = $('flt-strat');
  if(flt){ /* handled separately */ }
}

function renderStrategySelects() {
  ['f-strategy','e-strategy'].forEach(id => {
    const el = $(id); if(!el) return;
    const cur = el.value;

function renderMetrics(){
  const total=trades.reduce((s,t)=>s+t.pnl,0);
  const totalAmt=trades.reduce((s,t)=>s+(t.pnl*t.qty*PNL_PER_POINT),0);
  const wins=trades.filter(t=>t.pnl>0), losses=trades.filter(t=>t.pnl<0);
  const wr=trades.length?Math.round(wins.length/trades.length*100):null;
  const longs=trades.filter(t=>t.dir==='多'), shorts=trades.filter(t=>t.dir==='空');
  const longWr=longs.length?Math.round(longs.filter(t=>t.pnl>0).length/longs.length*100):null;
  const shortWr=shorts.length?Math.round(shorts.filter(t=>t.pnl>0).length/shorts.length*100):null;
  const avgLoss=losses.length?(losses.reduce((s,t)=>s+t.pnl,0)/losses.length):null;
  $('m-count').textContent=trades.length;
  const mT=$('m-total'); mT.textContent=(total>=0?'+':'')+total.toFixed(0); mT.className='value '+(total>=0?'pos':'neg');
  const mTA=$('m-total-amt'); mTA.textContent=(totalAmt>=0?'+':'')+totalAmt.toLocaleString(); mTA.className='value '+(totalAmt>=0?'pos':'neg');
  $('m-winrate').textContent=wr!==null?wr+'%':'-';
  $('m-long-wr').textContent=longWr!==null?longWr+'%':'-';
  $('m-short-wr').textContent=shortWr!==null?shortWr+'%':'-';
  $('m-avg-loss').textContent=avgLoss!==null?avgLoss.toFixed(1):'-';
}

const WEEKDAYS = ['日','一','二','三','四','五','六'];
function getWeekday(dateStr){ return WEEKDAYS[new Date(dateStr).getDay()]; }
function getWeekdayNum(dateStr){ return new Date(dateStr).getDay(); }

// 星期勝率
function renderWeekdayTable(){
  const el=$('weekday-table');
  if(!trades.length){el.innerHTML='<div class="empty" style="padding:20px">尚無資料</div>';return;}
  const groups={};
  for(let i=0;i<7;i++) groups[i]={label:WEEKDAYS[i],count:0,wins:0,losses:0,totalPnl:0};
  trades.forEach(t=>{
    const d=getWeekdayNum(t.date);
    groups[d].count++; groups[d].totalPnl+=t.pnl;
    if(t.pnl>0) groups[d].wins++; else groups[d].losses++;
  });
  // 只顯示有資料的星期，按週一到週日排序（週一=1~週日=0）
  const order=[1,2,3,4,5,6,0];
  el.innerHTML=`<table class="ptable">
    <tr><th>星期</th><th>次數</th><th>勝率</th><th>獲利</th><th>虧損</th><th>總損益(點)</th></tr>
    ${order.filter(i=>groups[i].count>0).map(i=>{
      const g=groups[i];
      const wr=Math.round(g.wins/g.count*100);
      return`<tr>
        <td style="font-weight:600">週${g.label}</td>
        <td>${g.count}</td>
        <td style="font-weight:600;color:${wr>=50?'#27ae60':'#e74c3c'}">${wr}%</td>
        <td class="pnl-pos">${g.wins}</td>
        <td class="pnl-neg">${g.losses}</td>
        <td class="${g.totalPnl>=0?'pnl-pos':'pnl-neg'}">${g.totalPnl>=0?'+':''}${g.totalPnl.toFixed(0)}</td>
      </tr>`;
    }).join('')}
  </table>`;
}
  const el=$('strategy-table');
  if(!trades.length){el.innerHTML='<div class="empty" style="padding:20px">尚無資料</div>';return;}
  const groups={};
  trades.forEach(t=>{
    const k=t.strategy||'（未設定）';
    if(!groups[k]) groups[k]={count:0,wins:0,losses:0,totalPnl:0};
    groups[k].count++;
    groups[k].totalPnl+=t.pnl;
    if(t.pnl>0) groups[k].wins++;
    else groups[k].losses++;
  });
  const keys=Object.keys(groups).sort((a,b)=>groups[b].count-groups[a].count);
  el.innerHTML=`<table class="ptable">
    <tr><th>策略</th><th>次數</th><th>勝率</th><th>獲利</th><th>虧損</th><th>總損益(點)</th></tr>
    ${keys.map(k=>{
      const g=groups[k];
      const wr=Math.round(g.wins/g.count*100);
      return`<tr>
        <td><span class="strat-badge">${k}</span></td>
        <td>${g.count}</td>
        <td style="font-weight:600;color:${wr>=50?'#27ae60':'#e74c3c'}">${wr}%</td>
        <td class="pnl-pos">${g.wins}</td>
        <td class="pnl-neg">${g.losses}</td>
        <td class="${g.totalPnl>=0?'pnl-pos':'pnl-neg'}">${g.totalPnl>=0?'+':''}${g.totalPnl.toFixed(0)}</td>
      </tr>`;
    }).join('')}
  </table>`;
}

function groupStats(list){
  const total=list.reduce((s,t)=>s+t.pnl,0);
  const totalAmt=list.reduce((s,t)=>s+(t.pnl*t.qty*PNL_PER_POINT),0);
  const wins=list.filter(t=>t.pnl>0), losses=list.filter(t=>t.pnl<0);
  const wr=list.length?Math.round(wins.length/list.length*100):0;
  const avgW=wins.length?(wins.reduce((s,t)=>s+t.pnl,0)/wins.length):null;
  const avgL=losses.length?(losses.reduce((s,t)=>s+t.pnl,0)/losses.length):null;
  return{count:list.length,total,totalAmt,wins:wins.length,losses:losses.length,wr,avgW,avgL};
}

function statsRow(g){
  return`<td>${g.count}</td>
    <td class="${g.total>=0?'pnl-pos':'pnl-neg'}">${g.total>=0?'+':''}${g.total.toFixed(0)}</td>
    <td class="${g.totalAmt>=0?'pnl-pos':'pnl-neg'}">${g.totalAmt>=0?'+':''}${g.totalAmt.toLocaleString()}元</td>
    <td>${g.count?g.wr+'%':'-'}</td>
    <td class="pnl-pos">${g.wins}</td><td class="pnl-neg">${g.losses}</td>
    <td class="pnl-pos">${g.avgW!==null?'+'+g.avgW.toFixed(1):'-'}</td>
    <td class="pnl-neg">${g.avgL!==null?g.avgL.toFixed(1):'-'}</td>`;
}
const pHdr=`<tr><th>次數</th><th>損益(點)</th><th>損益(元)</th><th>勝率</th><th>獲利</th><th>虧損</th><th>均獲利</th><th>均虧損</th></tr>`;

function renderPeriodTable(period){
  const el=$('period-table-wrap');
  if(!trades.length){el.innerHTML='<div class="empty" style="padding:20px">尚無資料</div>';return;}
  const now=new Date();
  if(period==='day'){
    const today=now.toISOString().slice(0,10);
    const g=groupStats(trades.filter(t=>t.date.slice(0,10)===today));
    el.innerHTML=`<table class="ptable">${pHdr}<tr>${statsRow(g)}</tr></table>`;
  }else if(period==='week'){
    const mon=new Date(now);mon.setDate(now.getDate()-now.getDay()+1);mon.setHours(0,0,0,0);
    const g=groupStats(trades.filter(t=>new Date(t.date)>=mon));
    el.innerHTML=`<table class="ptable">${pHdr}<tr>${statsRow(g)}</tr></table>`;
  }else if(period==='month'){
    const ym=now.toISOString().slice(0,7);
    const g=groupStats(trades.filter(t=>t.date.slice(0,7)===ym));
    el.innerHTML=`<table class="ptable">${pHdr}<tr>${statsRow(g)}</tr></table>`;
  }else if(period==='all_day'){
    const groups={};
    trades.forEach(t=>{const k=t.date.slice(0,10);if(!groups[k])groups[k]=[];groups[k].push(t);});
    const keys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
    el.innerHTML=`<table class="ptable"><tr><th>日期</th><th>次數</th><th>損益(點)</th><th>損益(元)</th><th>勝率</th><th>獲利</th><th>虧損</th><th>均獲利</th><th>均虧損</th></tr>
      ${keys.map(k=>{const g=groupStats(groups[k]);return`<tr><td style="font-weight:600">${k}</td>${statsRow(g)}</tr>`;}).join('')}</table>`;
  }else{
    const groups={};
    trades.forEach(t=>{const k=t.date.slice(0,7);if(!groups[k])groups[k]=[];groups[k].push(t);});
    const keys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
    el.innerHTML=`<table class="ptable"><tr><th>月份</th><th>次數</th><th>損益(點)</th><th>損益(元)</th><th>勝率</th><th>獲利</th><th>虧損</th><th>均獲利</th><th>均虧損</th></tr>
      ${keys.map(k=>{const g=groupStats(groups[k]);return`<tr><td style="font-weight:600">${k}</td>${statsRow(g)}</tr>`;}).join('')}</table>`;
  }
}

function renderCharts(){
  Object.values(charts).forEach(c=>c.destroy()); charts={};
  const sorted=[...trades].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!sorted.length) return;
  let cum=0;
  charts.cum=new Chart($('chart-cumulative'),{type:'line',
    data:{labels:sorted.map(t=>t.date.slice(5,16)),datasets:[{label:'累計損益',data:sorted.map(t=>{cum+=t.pnl;return cum;}),borderColor:'#1e3a5f',backgroundColor:'rgba(30,58,95,0.07)',fill:true,tension:0.35,pointRadius:4,pointBackgroundColor:sorted.map((_,i)=>{let s=0;sorted.slice(0,i+1).forEach(x=>s+=x.pnl);return s>=0?'#2ecc71':'#e74c3c';})}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxRotation:45,font:{size:11}},grid:{color:'rgba(0,0,0,0.04)'}},y:{ticks:{callback:v=>v>=0?'+'+v:v,font:{size:11}},grid:{color:'rgba(0,0,0,0.04)'}}}}});
  const bins={};
  sorted.forEach(t=>{const b=Math.floor(t.pnl/10)*10;bins[b]=(bins[b]||0)+1;});
  const bKeys=Object.keys(bins).map(Number).sort((a,b)=>a-b);
  charts.dist=new Chart($('chart-dist'),{type:'bar',
    data:{labels:bKeys.map(b=>b>=0?'+'+b:String(b)),datasets:[{data:bKeys.map(b=>bins[b]),backgroundColor:bKeys.map(b=>b>=0?'rgba(46,204,113,0.75)':'rgba(231,76,60,0.75)'),borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{ticks:{stepSize:1,font:{size:11}},grid:{color:'rgba(0,0,0,0.04)'}}}}});
  const lW=trades.filter(t=>t.dir==='多'&&t.pnl>0).length, lL=trades.filter(t=>t.dir==='多'&&t.pnl<=0).length;
  const sW=trades.filter(t=>t.dir==='空'&&t.pnl>0).length, sL=trades.filter(t=>t.dir==='空'&&t.pnl<=0).length;
  charts.dir=new Chart($('chart-dir'),{type:'bar',
    data:{labels:['做多','做空'],datasets:[{label:'獲利',data:[lW,sW],backgroundColor:'rgba(46,204,113,0.75)',borderRadius:5},{label:'虧損',data:[lL,sL],backgroundColor:'rgba(231,76,60,0.75)',borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:12},boxWidth:12,padding:16}}},scales:{x:{grid:{display:false}},y:{ticks:{stepSize:1},grid:{color:'rgba(0,0,0,0.04)'}}}}});
}

// 匯出 CSV
window.exportCSV = function(){
  if(!trades.length){alert('尚無資料可匯出');return;}
  const rows=trades.map(t=>[t.date.replace('T',' '),t.symbol,t.dir==='多'?'做多':'做空',t.qty,t.pnl,t.pnl*t.qty*PNL_PER_POINT,t.strategy||'','"'+(t.note||'').replace(/"/g,'""')+'"']);
  const csv='\uFEFF'+[['時間','商品','方向','口數','損益(點)','損益(元)','策略','備註'],...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='交易紀錄_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
};
</script>
